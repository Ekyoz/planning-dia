services:
  planning-dia:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: planning-dia:latest
    container_name: planning-dia
    ports:
      - "8000:8000"
    volumes:
      # Hot-reload : le dossier app/ local écrase celui du container
      - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3