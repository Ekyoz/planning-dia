services:
  planning-dia:
    build: .
    container_name: planning-dia
    ports:
      - "5000:5000"
    volumes:
      - /home/coxyz/planning-dia:/app
      - venv:/venv                    # ← venv persistant
      - uv-cache:/root/.cache/uv      # ← cache uv persistant
    restart: unless-stopped
    networks:
      - coxyz_network

volumes:
  venv:
  uv-cache:

networks:
  coxyz_network:
    external: true